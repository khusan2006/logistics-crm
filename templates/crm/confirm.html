{% extends "base.html" %}
{% block title %}{{ title }} · GranulaLog{% endblock %}
{% block topbar_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px;">
  <p class="muted">{{ message }}</p>
  <form method="post" style="margin-top: 16px;">
    {% csrf_token %}
    <button type="submit" class="btn {{ confirm_class }}">{{ confirm_label }}</button>
    <a class="btn btn-ghost" href="{% url cancel_url_name %}">Bekor qilish</a>
  </form>
</div>
{% endblock %}
